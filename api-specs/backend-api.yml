openapi: 3.0.3
info:
  title: CEEDS S3 Federator API
  version: 0.0.1
  description: Spec-first API for the CEEDS S3 Federator service.

servers:
  - url: /api
    description: Default API base path (relative to current host)
  - url: http://localhost:8080/api
    description: Local development server

tags:
  - name: ReferenceData
    description: Manage reference data objects, their versions and fields

paths:
  /reference-data-objects:
    get:
      tags: [ ReferenceData ]
      operationId: getAllReferenceDataObjects
      summary: Get all reference data objects including their versions and fields
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ReferenceDataObjectDetail'
    post:
      tags: [ ReferenceData ]
      operationId: createReferenceDataObject
      summary: Create a reference data object (with an initial draft version)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReferenceDataObjectRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReferenceDataObjectDetail'

  /reference-data-objects/{id}:
    get:
      tags: [ ReferenceData ]
      operationId: getReferenceDataObject
      summary: Get a reference data object including its versions and fields
      parameters:
        - $ref: '#/components/parameters/ReferenceDataObjectId'
      responses:
        '200':
          description: Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReferenceDataObjectDetail'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [ ReferenceData ]
      operationId: deleteReferenceDataObject
      summary: Delete a reference data object (only if no fields exist)
      parameters:
        - $ref: '#/components/parameters/ReferenceDataObjectId'
      responses:
        '204':
          description: Deleted
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /reference-data-objects/{id}/versions:
    post:
      tags: [ ReferenceData ]
      operationId: createVersion
      summary: Create a new version linking all fields of the latest version
      parameters:
        - $ref: '#/components/parameters/ReferenceDataObjectId'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReferenceDataObjectVersionDetail'
        '404':
          $ref: '#/components/responses/NotFound'

  /reference-data-objects/{id}/versions/{versionId}/publish:
    post:
      tags: [ ReferenceData ]
      operationId: publishVersion
      summary: Publish a version of a reference data object
      parameters:
        - $ref: '#/components/parameters/ReferenceDataObjectId'
        - $ref: '#/components/parameters/VersionId'
      responses:
        '200':
          description: Published
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReferenceDataObjectVersionDetail'
        '404':
          $ref: '#/components/responses/NotFound'

  /reference-data-objects/{id}/versions/{versionId}/fields:
    post:
      tags: [ ReferenceData ]
      operationId: createField
      summary: Create a field and link it to a version
      parameters:
        - $ref: '#/components/parameters/ReferenceDataObjectId'
        - $ref: '#/components/parameters/VersionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFieldRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FieldDto'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    put:
      tags: [ ReferenceData ]
      operationId: replaceVersionFields
      summary: Replace the full set of fields linked to a version
      parameters:
        - $ref: '#/components/parameters/ReferenceDataObjectId'
        - $ref: '#/components/parameters/VersionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReplaceVersionFieldsRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReferenceDataObjectVersionDetail'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /reference-data-objects/{id}/versions/{versionId}/fields/{fieldId}:
    delete:
      tags: [ ReferenceData ]
      operationId: unlinkField
      summary: Unlink a field from a version (deletes the field if unused by other versions)
      parameters:
        - $ref: '#/components/parameters/ReferenceDataObjectId'
        - $ref: '#/components/parameters/VersionId'
        - name: fieldId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Unlinked
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

components:
  parameters:
    ReferenceDataObjectId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    VersionId:
      name: versionId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Operation not allowed in the current state
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    DataType:
      type: string
      enum: [ NUMBER, TEXT, DATE ]

    PublishState:
      type: string
      enum: [ DRAFT, PUBLISHED ]

    Nation:
      type: string
      enum: [ AUT, FRA, ESP, GER ]

    ErrorResponse:
      type: object
      required: [ status, message ]
      properties:
        status:
          type: integer
          format: int32
        message:
          type: string

    CreateReferenceDataObjectRequest:
      type: object
      required: [ name, description ]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
          minLength: 1

    CreateFieldRequest:
      type: object
      required: [ name, dataType, mandatory ]
      properties:
        name:
          type: string
          minLength: 1
        dataType:
          $ref: '#/components/schemas/DataType'
        mandatory:
          type: boolean
        nation:
          $ref: '#/components/schemas/Nation'

    ReplaceVersionFieldsRequest:
      type: object
      required: [ fields ]
      properties:
        fields:
          type: array
          items:
            $ref: '#/components/schemas/VersionFieldRequest'

    VersionFieldRequest:
      type: object
      description: >-
        Provide `id` to keep an existing field linked. Omit `id` to create a new field
        (then name, dataType and mandatory are required).
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          minLength: 1
        dataType:
          $ref: '#/components/schemas/DataType'
        mandatory:
          type: boolean
        nation:
          $ref: '#/components/schemas/Nation'

    FieldDto:
      type: object
      required: [ id, name, dataType, mandatory, createdAt ]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        dataType:
          $ref: '#/components/schemas/DataType'
        mandatory:
          type: boolean
        nation:
          $ref: '#/components/schemas/Nation'
        createdAt:
          type: string
          format: date-time

    ReferenceDataObjectVersionDetail:
      type: object
      required: [ id, versionCode, publishState, createdAt, fields ]
      properties:
        id:
          type: string
          format: uuid
        versionCode:
          type: integer
          format: int32
        publishState:
          $ref: '#/components/schemas/PublishState'
        createdAt:
          type: string
          format: date-time
        fields:
          type: array
          items:
            $ref: '#/components/schemas/FieldDto'

    ReferenceDataObjectDetail:
      type: object
      required: [ id, name, description, createdAt, versions ]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        createdAt:
          type: string
          format: date-time
        versions:
          type: array
          items:
            $ref: '#/components/schemas/ReferenceDataObjectVersionDetail'
