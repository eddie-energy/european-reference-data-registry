openapi: 3.0.3
info:
  title: CEEDS S3 Federator API
  version: 0.0.1
  description: Spec-first API for the CEEDS S3 Federator service.

servers:
  - url: /api
    description: Default API base path (relative to current host)
  - url: http://localhost:8080/api
    description: Local development server

tags:
  - name: ReferenceData
    description: Manage reference data objects, their versions and fields
  - name: Entries
    description: Manage the data entries of a reference data object

paths:
  /reference-data-objects:
    get:
      tags: [ ReferenceData ]
      operationId: getAllReferenceDataObjects
      summary: Get all reference data objects including their versions and fields
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ReferenceDataObjectDetail'
    post:
      tags: [ ReferenceData ]
      operationId: createReferenceDataObject
      summary: Create a reference data object (with an initial draft version)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReferenceDataObjectRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReferenceDataObjectDetail'

  /reference-data-objects/{id}:
    get:
      tags: [ ReferenceData ]
      operationId: getReferenceDataObject
      summary: Get a reference data object including its versions and fields
      parameters:
        - $ref: '#/components/parameters/ReferenceDataObjectId'
      responses:
        '200':
          description: Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReferenceDataObjectDetail'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [ ReferenceData ]
      operationId: deleteReferenceDataObject
      summary: Delete a reference data object (only if no fields exist)
      parameters:
        - $ref: '#/components/parameters/ReferenceDataObjectId'
      responses:
        '204':
          description: Deleted
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /reference-data-objects/{id}/versions:
    post:
      tags: [ ReferenceData ]
      operationId: createVersion
      summary: Create a new version linking all fields of the latest version
      parameters:
        - $ref: '#/components/parameters/ReferenceDataObjectId'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReferenceDataObjectVersionDetail'
        '404':
          $ref: '#/components/responses/NotFound'

  /reference-data-objects/{id}/versions/{versionId}/publish:
    post:
      tags: [ ReferenceData ]
      operationId: publishVersion
      summary: Publish a version of a reference data object
      parameters:
        - $ref: '#/components/parameters/ReferenceDataObjectId'
        - $ref: '#/components/parameters/VersionId'
      responses:
        '200':
          description: Published
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReferenceDataObjectVersionDetail'
        '404':
          $ref: '#/components/responses/NotFound'

  /reference-data-objects/{id}/versions/{versionId}/fields:
    post:
      tags: [ ReferenceData ]
      operationId: createField
      summary: Create a field and link it to a version
      parameters:
        - $ref: '#/components/parameters/ReferenceDataObjectId'
        - $ref: '#/components/parameters/VersionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFieldRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FieldDto'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    put:
      tags: [ ReferenceData ]
      operationId: replaceVersionFields
      summary: Replace the full set of fields linked to a version
      parameters:
        - $ref: '#/components/parameters/ReferenceDataObjectId'
        - $ref: '#/components/parameters/VersionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReplaceVersionFieldsRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReferenceDataObjectVersionDetail'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /reference-data-objects/{id}/versions/{versionId}/fields/{fieldId}:
    delete:
      tags: [ ReferenceData ]
      operationId: unlinkField
      summary: Unlink a field from a version (deletes the field if unused by other versions)
      parameters:
        - $ref: '#/components/parameters/ReferenceDataObjectId'
        - $ref: '#/components/parameters/VersionId'
        - name: fieldId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Unlinked
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /reference-data-objects/{id}/versions/{versionId}/entries:
    get:
      tags: [ Entries ]
      operationId: listEntries
      summary: List the entries of a reference data object projected onto a version
      description: >-
        Entries belong to the reference data object, not to a single version. The response
        contains one value per field linked to the given version; values of fields that are
        not linked to this version are omitted but remain stored.
      parameters:
        - $ref: '#/components/parameters/ReferenceDataObjectId'
        - $ref: '#/components/parameters/VersionId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EntryDto'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [ Entries ]
      operationId: createEntry
      summary: Create an entry using the field set of the given version
      parameters:
        - $ref: '#/components/parameters/ReferenceDataObjectId'
        - $ref: '#/components/parameters/VersionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertEntryRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntryDto'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /reference-data-objects/{id}/versions/{versionId}/entries/{entryId}:
    put:
      tags: [ Entries ]
      operationId: updateEntry
      summary: Replace the values an entry holds for the fields of the given version
      description: >-
        Only fields linked to the given version are touched. Omitting a field or sending it
        without a value deletes the stored value for that field.
      parameters:
        - $ref: '#/components/parameters/ReferenceDataObjectId'
        - $ref: '#/components/parameters/VersionId'
        - $ref: '#/components/parameters/EntryId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertEntryRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntryDto'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /reference-data-objects/{id}/entries/{entryId}:
    delete:
      tags: [ Entries ]
      operationId: deleteEntry
      summary: Delete an entry and all of its values
      parameters:
        - $ref: '#/components/parameters/ReferenceDataObjectId'
        - $ref: '#/components/parameters/EntryId'
      responses:
        '204':
          description: Deleted
        '404':
          $ref: '#/components/responses/NotFound'

components:
  parameters:
    ReferenceDataObjectId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    VersionId:
      name: versionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    EntryId:
      name: entryId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Operation not allowed in the current state
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    DataType:
      type: string
      enum: [ NUMBER, TEXT, DATE, ENUM ]

    PublishState:
      type: string
      enum: [ DRAFT, PUBLISHED ]

    Nation:
      type: string
      enum: [ AUT, FRA, ESP, GER ]

    ErrorResponse:
      type: object
      required: [ status, message ]
      properties:
        status:
          type: integer
          format: int32
        message:
          type: string

    CreateReferenceDataObjectRequest:
      type: object
      required: [ name, description ]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
          minLength: 1

    EnumOptionDto:
      type: object
      required: [ id, name, createdAt ]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        createdAt:
          type: string
          format: date-time

    CreateFieldRequest:
      type: object
      description: >-
        `options` is required (and only allowed) when `dataType` is `ENUM`.
        Option names must be non-blank and unique within the field.
      required: [ name, dataType, mandatory ]
      properties:
        name:
          type: string
          minLength: 1
        dataType:
          $ref: '#/components/schemas/DataType'
        mandatory:
          type: boolean
        nation:
          $ref: '#/components/schemas/Nation'
        options:
          type: array
          items:
            type: string
            minLength: 1

    ReplaceVersionFieldsRequest:
      type: object
      required: [ fields ]
      properties:
        fields:
          type: array
          items:
            $ref: '#/components/schemas/VersionFieldRequest'

    VersionFieldRequest:
      type: object
      description: >-
        Provide `id` to keep an existing field linked. Omit `id` to create a new field
        (then name, dataType and mandatory are required). `options` is required (and only
        allowed) when `dataType` is `ENUM`; option names must be non-blank and unique
        within the field.
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          minLength: 1
        dataType:
          $ref: '#/components/schemas/DataType'
        mandatory:
          type: boolean
        nation:
          $ref: '#/components/schemas/Nation'
        options:
          type: array
          items:
            type: string
            minLength: 1

    FieldDto:
      type: object
      required: [ id, name, dataType, mandatory, createdAt, options ]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        dataType:
          $ref: '#/components/schemas/DataType'
        mandatory:
          type: boolean
        nation:
          $ref: '#/components/schemas/Nation'
        createdAt:
          type: string
          format: date-time
        options:
          type: array
          description: Empty for every data type except `ENUM`.
          items:
            $ref: '#/components/schemas/EnumOptionDto'

    ReferenceDataObjectVersionDetail:
      type: object
      required: [ id, versionCode, publishState, createdAt, fields ]
      properties:
        id:
          type: string
          format: uuid
        versionCode:
          type: integer
          format: int32
        publishState:
          $ref: '#/components/schemas/PublishState'
        createdAt:
          type: string
          format: date-time
        fields:
          type: array
          items:
            $ref: '#/components/schemas/FieldDto'

    EntryValueDto:
      type: object
      description: >-
        Exactly one value property may be set and it must match the `dataType` of the field:
        TEXT -> `textValue`, NUMBER -> `numberValue`, DATE -> `dateValue`, ENUM -> `enumOptionId`.
        All value properties absent means the entry has no value for that field.
      required: [ fieldId ]
      properties:
        fieldId:
          type: string
          format: uuid
        textValue:
          type: string
        numberValue:
          type: number
        dateValue:
          type: string
          format: date
        enumOptionId:
          type: string
          format: uuid

    UpsertEntryRequest:
      type: object
      required: [ nation, values ]
      properties:
        nation:
          $ref: '#/components/schemas/Nation'
        values:
          type: array
          items:
            $ref: '#/components/schemas/EntryValueDto'

    EntryDto:
      type: object
      required: [ id, createdAt, updatedAt, complete, values ]
      properties:
        id:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        nation:
          $ref: '#/components/schemas/Nation'
        complete:
          type: boolean
          description: False when a mandatory field of the requested version has no value.
        values:
          type: array
          description: One item per field linked to the requested version.
          items:
            $ref: '#/components/schemas/EntryValueDto'

    ReferenceDataObjectDetail:
      type: object
      required: [ id, name, description, createdAt, versions ]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        createdAt:
          type: string
          format: date-time
        versions:
          type: array
          items:
            $ref: '#/components/schemas/ReferenceDataObjectVersionDetail'
